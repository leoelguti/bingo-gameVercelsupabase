<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Game</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen p-8">
    <div class="container mx-auto">
        <div class="number-circle" id="randomNumber">?</div>
        <div class="text-center mb-8">
            <button id="generateNumber" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Generar bola
            </button>
        </div>
        <div class="bg-gray-800 p-4 rounded-lg mb-8">
            <div id="ballsGrid" class="flex flex-wrap justify-center"></div>
        </div>
        <div class="text-center mb-8">
            <div class="inline-flex flex-col sm:flex-row justify-center items-center gap-4 bg-gray-800 p-6 rounded-lg shadow-lg">
                <div class="flex items-center gap-3">
                    <label for="cardCount" class="text-white text-lg font-medium">Cantidad de cartones:</label>
                    <input type="number" id="cardCount" min="1" max="500" value="4" 
                        class="w-24 px-4 py-2 border-2 border-blue-500 rounded-lg text-lg text-black focus:outline-none focus:border-blue-600" 
                        placeholder="1-20" onfocus="this.select()">
                </div>
                <div class="flex items-center gap-3">
                    <label for="cardPrice" class="text-white text-lg font-medium">Precio por cartón:</label>
                    <input type="number" id="cardPrice" min="1" max="10000" value="10" 
                        class="w-24 px-4 py-2 border-2 border-blue-500 rounded-lg text-lg text-black focus:outline-none focus:border-blue-600" 
                        placeholder="Precio" onfocus="this.select()">
                </div>
                <div class="flex items-center gap-3">
                    <label for="figure" class="text-white text-lg font-medium">Figura:</label>
                    <select id="figure" class="w-24 px-4 py-2 border-2 border-blue-500 rounded-lg text-lg text-black focus:outline-none focus:border-blue-600">
                        <option value="X">X</option>
                        <option value="L">L</option>
                        <option value="N">N</option>
                        <option value="T">T</option>
                        <option value="H">H</option>
                    </select>
                </div>
                <button id="generateCards" class="bg-green-500 hover:bg-green-600 text-white text-lg font-bold py-2 px-6 rounded-lg transition-colors duration-200">
                    Generar cartones
                </button>
            </div>
        </div>
        <div id="messageBox" class="hidden bg-yellow-300 p-4 rounded-lg text-black text-center mb-8">
            <p id="messageText"></p>
            <button id="closeMessageBox" class="mt-4 bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Cerrar
            </button>
        </div>

        <div id="winnerQuestionBox" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center">
            <div class="bg-white p-6 rounded-lg text-black text-center">
                <p id="winnerQuestionText" class="mb-4">¿Alguien cantó?</p>
                <button id="winnerYes" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mr-2">
                    Sí
                </button>
                <button id="winnerNo" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                    No
                </button>
            </div>
        </div>

        <div id="ballCount" class="text-center mb-8">
            <h3 class="text-white text-lg font-bold">Bolas generadas: <span id="countDisplay">0</span>/75</h3>
        </div>
        <div id="lastBalls" class="text-center mb-8">
            <h3 class="text-white text-lg font-bold">Últimas 6 bolas:</h3>
            <div id="lastBallsList"></div>
        </div>
        <div class="text-center mb-8">
            <div class="bg-blue-800 inline-block px-6 py-3 rounded-lg">
                <h2 class="text-white text-xl font-bold" id="gameMode">Modo: Figura</h2>
            </div>
        </div>
        <div id="bingoCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 justify-items-center"></div>
        <div class="text-center mt-8">
            <div id="prizeBox" class="hidden bg-yellow-300 p-4 rounded-lg">
                <h3 class="text-black font-bold">¡Tabla de premiaciones!</h3>
                <p id="prizeDetails" class="text-black"></p>
            </div>
            <button id="togglePrizeBox" class="mt-4 bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded">
                Mostrar/Ocultar
            </button>
        </div>
        
        <div class="text-center mt-8">
            <button id="exportPdfButton" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Exportar Cartones a PDF
            </button>
        </div>
        <div class="text-center mt-8">
            <div id="winnersLog" class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-white font-bold">Registro de Ganadores</h3>
                <ul id="winnersList" class="text-white"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
